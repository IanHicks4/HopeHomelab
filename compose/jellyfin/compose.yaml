services:
  jellyfin:
    image: lscr.io/linuxserver/jellyfin:latest
    container_name: jellyfin
    network_mode: host

    environment:
      - PUID=1000
      - PGID=1000
      - TZ=America/New_York

    volumes:
      - ./config:/config
      - /mnt/media:/media

    devices:
      - /dev/dri:/dev/dri

    restart: unless-stopped
